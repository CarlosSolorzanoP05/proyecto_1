{% extends 'billing/base.html' %}
{% block title %}Eliminar Producto{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger bg-light shadow-sm rounded-4">
      <div class="card-header bg-danger text-white border-0 py-3"><h4>Eliminar</h4></div>
      <div class="card-body">
        <p>¿Estás seguro de que deseas eliminar <strong>{{ object }}</strong>?</p>
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger btn-lg px-4">Sí, Eliminar</button>
          <a href="{% url 'billing:product_list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
